<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #1f1d1b; }
      .accent { fill: #2d4ef5; }
      .ink { fill: #f4f4f2; }
      .mute { fill: rgba(244,244,242,0.6); }
      .display {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .mono {
        font-family: 'Menlo', 'Consolas', monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630" />

  <!-- accent block -->
  <rect class="accent" x="0" y="0" width="12" height="630" />

  <!-- eyebrow -->
  <text x="80" y="180" class="ink mono" font-size="22" fill-opacity="0.6">JONATHAN TIRITILLI</text>

  <!-- main title -->
  <text x="80" y="320" class="ink display" font-size="120">Principal</text>
  <text x="80" y="450" class="ink display" font-size="120">Engineer.</text>

  <!-- accent rule -->
  <rect class="accent" x="80" y="490" width="80" height="4" />

  <!-- subtext -->
  <text x="80" y="555" class="mute" font-size="28" font-family="Helvetica, Arial, sans-serif">Domo · BI · AI tooling · graph systems</text>

  <!-- url bottom right -->
  <text x="1120" y="585" class="mute mono" font-size="20" text-anchor="end">jonathantiritilli.com</text>
</svg>
